---
name: Lint

on:
  push:
    branches:
    - '*'
    tags-ignore:
    - '*'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Configure pre-commit
      run: |
        pip install --upgrade pip
        pip install pre-commit==4.5.1
    - name: Repeat pre-commit
      run: pre-commit run --all-files
